<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>EchoDupe | Neon Snake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    
    <style>
        /* --- CSS RESTYLE --- */
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-dark: #0a0b10;
            --panel-bg: rgba(20, 22, 30, 0.9);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
        }

        .wrapper {
            width: 100%;
            max-width: 450px;
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 10px rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score { color: var(--neon-green); }
        .high-score { color: #ffd700; }

        .play-board {
            height: 350px;
            width: 100%;
            background: #000;
            display: grid;
            grid-template: repeat(30, 1fr) / repeat(30, 1fr);
            border-radius: 8px;
            border: 2px solid #1a1c23;
            position: relative;
        }

        /* Snake & Food styling */
        .head { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); border-radius: 4px; }
        .body { background: #2ecc71; opacity: 0.8; border-radius: 2px; }
        .food { background: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); border-radius: 50%; }

        /* Controls styling */
        .controls {
            display: flex;
            justify-content: space-evenly;
            margin-top: 25px;
        }

        .controls i {
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1c23;
            border-radius: 12px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .controls i:hover { background: var(--neon-green); color: black; transform: scale(1.1); }
        
        .reset-btn {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: transparent;
            color: var(--neon-red);
            border: 1px solid var(--neon-red);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .reset-btn:hover { background: var(--neon-red); color: white; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="game-details">
            <span class="score">Score: 0</span>
            <span class="high-score">Best: 0</span>
        </div>
        
        <div class="play-board"></div>
        
        <div class="controls">
            <i data-key="ArrowLeft" class="fa-solid fa-arrow-left-long"></i>
            <i data-key="ArrowUp" class="fa-solid fa-arrow-up-long"></i>
            <i data-key="ArrowDown" class="fa-solid fa-arrow-down-long"></i>
            <i data-key="ArrowRight" class="fa-solid fa-arrow-right-long"></i>
        </div>

        <button class="reset-btn" onclick="resetData()">Reset Player Data</button>
    </div>

    <script>
        /* --- JS GAME LOGIC --- */
        const playBoard = document.querySelector(".play-board");
        const scoreElement = document.querySelector(".score");
        const highScoreElement = document.querySelector(".high-score");
        const controls = document.querySelectorAll(".controls i");

        let gameOver = false;
        let foodX, foodY;
        let snakeX = 5, snakeY = 5;
        let velocityX = 0, velocityY = 0;
        let snakeBody = [];
        let setIntervalId;
        let score = 0;

        // LOAD HIGH SCORE
        let highScore = localStorage.getItem("snake-high-score") || 0;
        highScoreElement.innerText = `Best: ${highScore}`;

        const updateFoodPosition = () => {
            foodX = Math.floor(Math.random() * 30) + 1;
            foodY = Math.floor(Math.random() * 30) + 1;
        }

        const handleGameOver = () => {
            clearInterval(setIntervalId);
            alert("Game Over! Press OK to replay...");
            location.reload();
        }

        const changeDirection = e => {
            if(e.key === "ArrowUp" && velocityY != 1) { velocityX = 0; velocityY = -1; }
            else if(e.key === "ArrowDown" && velocityY != -1) { velocityX = 0; velocityY = 1; }
            else if(e.key === "ArrowLeft" && velocityX != 1) { velocityX = -1; velocityY = 0; }
            else if(e.key === "ArrowRight" && velocityX != -1) { velocityX = 1; velocityY = 0; }
        }

        // CONTROL BUTTONS
        controls.forEach(button => button.addEventListener("click", () => changeDirection({ key: button.dataset.key })));

        const initGame = () => {
            if(gameOver) return handleGameOver();
            let html = `<div class="food" style="grid-area: ${foodY} / ${foodX}"></div>`;

            // Eating Food
            if(snakeX === foodX && snakeY === foodY) {
                updateFoodPosition();
                snakeBody.push([foodY, foodX]);
                score++;
                highScore = score >= highScore ? score : highScore;
                localStorage.setItem("snake-high-score", highScore);
                scoreElement.innerText = `Score: ${score}`;
                highScoreElement.innerText = `Best: ${highScore}`;
            }

            // Move Snake Body
            for (let i = snakeBody.length - 1; i > 0; i--) {
                snakeBody[i] = snakeBody[i - 1];
            }
            snakeBody[0] = [snakeX, snakeY];

            snakeX += velocityX;
            snakeY += velocityY;

            // Wall Collision
            if(snakeX <= 0 || snakeX > 30 || snakeY <= 0 || snakeY > 30) {
                return gameOver = true;
            }

            for (let i = 0; i < snakeBody.length; i++) {
                html += `<div class="${i === 0 ? 'head' : 'body'}" style="grid-area: ${snakeBody[i][1]} / ${snakeBody[i][0]}"></div>`;
                // Self Collision
                if (i !== 0 && snakeBody[0][1] === snakeBody[i][1] && snakeBody[0][0] === snakeBody[i][0]) {
                    gameOver = true;
                }
            }
            playBoard.innerHTML = html;
        }

        function resetData() {
            if(confirm("Wipe your high score?")) {
                localStorage.removeItem("snake-high-score");
                location.reload();
            }
        }

        updateFoodPosition();
        setIntervalId = setInterval(initGame, 100);
        document.addEventListener("keyup", changeDirection);
    </script>
</body>
</html>
