<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
    <title>EchoDupe | HallowEcho</title>
    
    <link rel="icon" type="image/png" href="./assets/hallowecho.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Helvetica', Arial, sans-serif; color: #06b6d4; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: none; }

        .back-to-hub {
            position: fixed; top: 20px; left: 20px; z-index: 10000;
            background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(6, 182, 212, 0.4);
            color: #06b6d4; padding: 10px 18px; border-radius: 12px; font-weight: bold;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(10px); transition: all 0.3s ease;
            font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
        }
        .back-to-hub:hover { background: #06b6d4; color: #000; box-shadow: 0 0 15px rgba(6, 182, 212, 0.5); }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Updated to lowercase 'assets' */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('./assets/hallowecho.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; cursor: pointer; text-align: center;
        }
        .loading-text { font-size: 18px; font-weight: bold; letter-spacing: 5px; animation: flicker 2s infinite; font-family: 'Courier New', monospace; }
        
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <a href="https://echodupe.github.io/Games/" class="back-to-hub">
        <i class="fa-solid fa-house"></i><span>Back to Hub</span>
    </a>

    <div id="loader" onclick="startGame()">
        <div class="loading-text">CLICK TO INITIALIZE HALLOWECHO...</div>
        <div style="font-size: 10px; margin-top: 10px; opacity: 0.5;">v1.0.5 - SYSTEM ONLINE</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script src="map.js"></script>
    <script src="main.js"></script>

    <script>
        function startGame() {
            const loader = document.getElementById('loader');
            loader.style.transition = "opacity 0.8s ease, visibility 0.8s";
            loader.style.opacity = "0";
            loader.style.visibility = "hidden";
            
            if (window.initHallowEcho) {
                window.initHallowEcho();
            } else {
                console.error("HallowEcho: Engine load failed.");
            }
        }
    </script>
</body>
</html>
