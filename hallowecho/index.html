<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>EchoDupe | HallowEcho</title>
    <link rel="icon" type="image/png" href="./assets/hallowecho.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }

        /* Loader */
        #loader {
            position: fixed; inset: 0; background-color: #0a0a0a;
            display: flex; flex-direction: column; align-items: center; z-index: 9999;
        }
        .logo-container { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; }
        .loader-logo { width: 300px; height: auto; filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.2)); }
        .bottom-bar { width: 100%; padding-bottom: 60px; display: flex; justify-content: center; }
        .init-box { border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.02); padding: 15px 60px; cursor: pointer; }
        .init-box:hover { border-color: #06b6d4; background: rgba(6, 182, 212, 0.1); }

        /* Settings Menu */
        #settingsMenu {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(5, 5, 5, 0.95); border: 1px solid #06b6d4; padding: 30px;
            z-index: 10000; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .setting-row { margin: 20px 0; }
        input[type=range] { width: 200px; accent-color: #06b6d4; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="logo-container"><img src="./assets/hallowecho.png" class="loader-logo"></div>
        <div class="bottom-bar">
            <div class="init-box" onclick="startGame()"><div>INITIALIZE_SYSTEM</div></div>
        </div>
    </div>

    <div id="settingsMenu">
        <h2 style="color:#06b6d4; margin-top:0;">SETTINGS</h2>
        <div class="setting-row">
            <label>BRIGHTNESS</label><br>
            <input type="range" id="brightnessRange" min="50" max="300" value="100">
        </div>
        <div class="setting-row">
            <label>MOUSE SENSITIVITY</label><br>
            <input type="range" id="sensRange" min="1" max="10" value="5">
        </div>
        <p style="font-size: 10px; color: #666;">CLICK CANVAS TO RELOCK MOUSE</p>
        <button onclick="toggleSettings()" style="background:#06b6d4; border:none; padding:10px 20px; cursor:pointer; font-weight:bold; color: black;">CLOSE [P]</button>
    </div>

    <canvas id="gameCanvas" onclick="requestLock()"></canvas>

    <script src="map.js"></script>
    <script src="main.js"></script>

    <script>
        function requestLock() {
            const canvas = document.getElementById('gameCanvas');
            if (!settingsOpen) {
                canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
                canvas.requestPointerLock();
            }
        }

        function startGame() {
            const loader = document.getElementById('loader');
            loader.style.background = "#000";
            loader.innerHTML = ""; 
            setTimeout(() => {
                if (window.initHallowEcho) window.initHallowEcho();
                loader.style.display = 'none';
            }, 400);
        }

        function toggleSettings() {
            const menu = document.getElementById('settingsMenu');
            settingsOpen = !settingsOpen;
            if (settingsOpen) document.exitPointerLock();
            menu.style.display = settingsOpen ? 'block' : 'none';
        }
    </script>
</body>
</html>
