<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>HALLOWECHO | Extreme Edition</title>
    <style>
        :root { --glitch-color: #06b6d4; }
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; border: 1px solid var(--glitch-color); border-radius: 50%;
        }

        #loader { 
            position: fixed; inset: 0; background: #050505; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .start-btn { 
            padding: 20px 50px; border: 2px solid var(--glitch-color); background: transparent; 
            color: var(--glitch-color); cursor: pointer; font-weight: bold; display: none;
            text-shadow: 0 0 10px var(--glitch-color);
        }
        .start-btn:hover { background: var(--glitch-color); color: black; }

        #settings { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); border: 1px solid var(--glitch-color); padding: 40px;
            display: none; z-index: 2000; pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="loader">
        <h1 id="load-text">CALIBRATING SYSTEM...</h1>
        <button id="start-btn" class="start-btn" onclick="startGame()">INIT_HALLOWECHO</button>
    </div>

    <div id="settings">
        <h2 style="color:var(--glitch-color)">ENGINE_CONFIG</h2>
        <div style="margin:20px 0;">
            <label>BRIGHTNESS_COEFFICIENT</label><br>
            <input type="range" id="bright" min="50" max="400" value="100">
        </div>
        <div style="margin:20px 0;">
            <label>MOUSE_SENSITIVITY</label><br>
            <input type="range" id="sens" min="1" max="20" value="10">
        </div>
        <div style="margin:20px 0;">
            <label>FOV_ADJUST</label><br>
            <input type="range" id="fov" min="40" max="110" value="60">
        </div>
        <button onclick="toggleSettings()" style="cursor:pointer; padding:10px;">SAVE_AND_CLOSE [P]</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" onclick="lockPointer()"></canvas>
        <div id="ui-layer">
            <div id="crosshair"></div>
        </div>
    </div>

    <script src="map.js"></script>
    <script src="main.js"></script>
    <script>
        function lockPointer() { if(!isPaused) document.getElementById('gameCanvas').requestPointerLock(); }
        function startGame() { 
            document.getElementById('loader').style.display = 'none'; 
            if(window.initHallowEcho) window.initHallowEcho(); 
        }
    </script>
</body>
</html>
