<!DOCTYPE html>
<html>
<head>
<title>EchoDupe Mini Tycoon</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<div id="ui">
Money: $<span id="money">0</span><br>
Workers: <span id="workers">0</span><br>
Walk into trees for money 🌳<br>
Blue house = buy worker ($25)
</div>

<script>

let scene = new THREE.Scene()
scene.background = new THREE.Color(0x87ceeb)

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(50,100,50)
scene.add(light)

let groundGeo = new THREE.PlaneGeometry(200,200)
let groundMat = new THREE.MeshStandardMaterial({color:0x3aa655})
let ground = new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x = -Math.PI/2
scene.add(ground)

camera.position.y = 2

let player = {
x:0,
z:0,
speed:0.15
}

let money = 0
let workers = 0

let trees = []

function createTree(x,z){

let trunkGeo = new THREE.CylinderGeometry(0.3,0.3,2)
let trunkMat = new THREE.MeshStandardMaterial({color:0x8b5a2b})
let trunk = new THREE.Mesh(trunkGeo,trunkMat)

trunk.position.set(x,1,z)
scene.add(trunk)

let leavesGeo = new THREE.SphereGeometry(1.2)
let leavesMat = new THREE.MeshStandardMaterial({color:0x2ecc71})
let leaves = new THREE.Mesh(leavesGeo,leavesMat)

leaves.position.set(x,2.5,z)
scene.add(leaves)

trees.push({x:x,z:z})

}

for(let i=0;i<25;i++){
createTree(
(Math.random()-0.5)*100,
(Math.random()-0.5)*100
)
}

let houseGeo = new THREE.BoxGeometry(5,4,5)
let houseMat = new THREE.MeshStandardMaterial({color:0x3399ff})
let shop = new THREE.Mesh(houseGeo,houseMat)

shop.position.set(10,2,10)
scene.add(shop)

let keys = {}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false
})

document.body.addEventListener("click",()=>{
document.body.requestPointerLock()
})

document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body){

camera.rotation.y -= e.movementX*0.002
camera.rotation.x -= e.movementY*0.002

camera.rotation.x = Math.max(-1.2,Math.min(1.2,camera.rotation.x))

}
})

function update(){

let dirX = Math.sin(camera.rotation.y)
let dirZ = Math.cos(camera.rotation.y)

if(keys["w"]){
player.x += dirX*player.speed
player.z += dirZ*player.speed
}

if(keys["s"]){
player.x -= dirX*player.speed
player.z -= dirZ*player.speed
}

if(keys["a"]){
player.x += dirZ*player.speed
player.z -= dirX*player.speed
}

if(keys["d"]){
player.x -= dirZ*player.speed
player.z += dirX*player.speed
}

camera.position.x = player.x
camera.position.z = player.z

trees.forEach(tree=>{

let dx = player.x-tree.x
let dz = player.z-tree.z
let dist = Math.sqrt(dx*dx+dz*dz)

if(dist<2){
money += 5
tree.x = (Math.random()-0.5)*100
tree.z = (Math.random()-0.5)*100
}

})

let dx = player.x-shop.position.x
let dz = player.z-shop.position.z
let dist = Math.sqrt(dx*dx+dz*dz)

if(dist<4 && money>=25){
money -= 25
workers++
}

money += workers*0.05

document.getElementById("money").innerText = Math.floor(money)
document.getElementById("workers").innerText = workers

}

function animate(){

update()

renderer.render(scene,camera)

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
