<!DOCTYPE html>
<html>
<head>
    <title>EchoDupe Game V6</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background: #000; }
        
        #menu-overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #001a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: #00ffff; text-align: center;
        }
        #play-btn {
            padding: 15px 50px; font-size: 24px; font-weight: bold;
            background: transparent; border: 2px solid #00ffff; color: #00ffff;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 5px;
        }
        #play-btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 30px #00ffff; }

        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #00ffff; background: rgba(0,20,20,0.8);
            padding: 20px; border: 1px solid #00ffff; display: none;
            box-shadow: 0 0 15px rgba(0,255,255,0.2); pointer-events: none;
        }
        
        /* Mini-map Styling */
        #minimap-container {
            position: absolute; bottom: 20px; right: 20px;
            width: 150px; height: 150px;
            background: rgba(0, 10, 10, 0.8);
            border: 2px solid #00ffff; border-radius: 5px;
            display: none; overflow: hidden;
        }
        #minimap-canvas { width: 100%; height: 100%; }

        #shop-gui {
            display: none; position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); width: 350px;
            background: #050505; color: #00ffff; padding: 30px;
            border: 2px solid #00ffff; text-align: center;
            box-shadow: 0 0 50px rgba(0,255,255,0.4); z-index: 101;
        }

        .btn {
            background: #002222; color: #00ffff; border: 1px solid #00ffff;
            padding: 12px; width: 100%; margin-top: 10px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn:hover:not(:disabled) { background: #00ffff; color: #000; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #rebirth-btn { border-color: #ff00ff; color: #ff00ff; margin-top: 20px; }
        
        #msg { position: absolute; bottom: 10%; width: 100%; text-align: center; color: #00ffff; font-weight: bold; display: none; text-transform: uppercase; pointer-events: none;}
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 style="font-size: 50px; text-shadow: 0 0 20px #00ffff;">ECHODUPE V6</h1>
    <p style="letter-spacing: 2px;">NEON RADAR ACTIVE</p><br>
    <button id="play-btn" onclick="startGame()">Initialize Systems</button>
</div>

<div id="ui">
    <span style="font-size: 12px;">NET WORTH</span><br>
    <span style="font-size: 32px; font-weight: bold;">$<span id="money">0</span></span><br>
    <div style="color: #ffcc00; font-size: 10px; margin-top: 5px;">[SHIFT] UNLIMITED SPRINT</div>
    <div style="margin-top:10px; font-size: 13px; border-top: 1px solid #004444; padding-top: 5px;">
        WORKERS: <span id="workerCount">0</span><br>
        REBIRTHS: <span id="rebirthCount">0</span><br>
        MULTI: <span id="uiMult">1.0</span>x
    </div>
</div>

<div id="minimap-container">
    <canvas id="minimap-canvas"></canvas>
</div>

<div id="shop-gui">
    <h2 style="margin:0; letter-spacing: 3px;">SYSTEM UPGRADES</h2>
    <hr style="border: 0; border-top: 1px solid #00ffff; margin: 15px 0; opacity: 0.3;">
    <button class="btn" id="buyWorker" onclick="buyWorker()">Contract NPC: $<span id="wP">25</span></button>
    <button class="btn" id="buyBoost" onclick="buyBoost()">Cyan Tools: $<span id="bP">100</span></button>
    <button class="btn" id="rebirth-btn" onclick="doRebirth()">REBIRTH: $5000</button>
    <button class="btn" onclick="closeShop()" style="margin-top: 25px; border:none; background: #440000; color: white;">DISCONNECT</button>
</div>

<div id="msg">Approach the Log Cabin and Click to Open Shop</div>

<script>
// --- AUDIO SYSTEM ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

// --- CORE STATS ---
let stats = { money: 25, workers: 0, mult: 1, wPrice: 25, bPrice: 100, rebirths: 0 };
let gameStarted = false;
let workerNPCs = [];

function save() { localStorage.setItem('EchoDupeV6_Save', JSON.stringify(stats)); }
function load() {
    const s = localStorage.getItem('EchoDupeV6_Save');
    if(s) { 
        stats = JSON.parse(s);
        for(let i=0; i<stats.workers; i++) spawnHumanNPC();
    }
}

// --- THREE.JS SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000505);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0x404040, 2); scene.add(ambient);
const light = new THREE.PointLight(0x00ffff, 1.5, 100); light.position.set(0, 10, -25); scene.add(light);

// World Items
const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x050505}));
ground.rotation.x = -Math.PI/2; scene.add(ground);
const grid = new THREE.GridHelper(500, 50, 0x00ffff, 0x002222);
grid.position.y = 0.05; scene.add(grid);

function createWoodShop() {
    const shop = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({color: 0x3d2b1f});
    for(let y=0; y<8; y++) {
        const logF = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 12), woodMat);
        logF.rotation.z = Math.PI/2; logF.position.set(0, y*0.9, 5); shop.add(logF);
        const logB = logF.clone(); logB.position.z = -5; shop.add(logB);
        const logL = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10), woodMat);
        logL.rotation.x = Math.PI/2; logL.position.set(-6, y*0.9, 0); shop.add(logL);
        const logR = logL.clone(); logR.position.x = 6; shop.add(logR);
    }
    const roof = new THREE.Mesh(new THREE.ConeGeometry(9, 5, 4), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
    roof.position.y = 10; roof.rotation.y = Math.PI/4; shop.add(roof);
    const sign = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 0.2), new THREE.MeshStandardMaterial({emissive: 0x00ffff, color: 0x00ffff}));
    sign.position.set(0, 5, 5.2); shop.add(sign);
    shop.position.set(0, 0, -25); scene.add(shop);
}
createWoodShop();

// --- NPCs ---
function spawnHumanNPC() {
    const group = new THREE.Group();
    const skin = new THREE.MeshStandardMaterial({color: 0xdbac82});
    const clothes = new THREE.MeshStandardMaterial({color: 0x004444});
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), skin); head.position.y = 1.6;
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7), clothes); body.position.y = 0.9;
    group.add(head, body);
    group.position.set((Math.random()-0.5)*40, 0, (Math.random()-0.5)*40 - 20);
    scene.add(group);
    workerNPCs.push({ mesh: group, tx: (Math.random()-0.5)*150, tz: (Math.random()-0.5)*150 });
}

let trees = [];
for(let i=0; i<80; i++) {
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3), new THREE.MeshStandardMaterial({color: 0x221100}));
    const leaves = new THREE.Mesh(new THREE.ConeGeometry(2, 5, 6), new THREE.MeshStandardMaterial({color: 0x003333, emissive: 0x001111}));
    leaves.position.y = 3; tree.add(trunk, leaves);
    let rx = (Math.random()-0.5)*250; let rz = (Math.random()-0.5)*250;
    if(Math.abs(rx) < 15 && rz < 0) rx += 25;
    tree.position.set(rx, 0, rz); scene.add(tree);
    trees.push({obj: tree, x: rx, z: rz});
}

// --- LOGIC ---
function buyWorker() {
    if(stats.money >= stats.wPrice) {
        stats.money -= stats.wPrice; stats.workers++; stats.wPrice = Math.floor(stats.wPrice * 1.3);
        spawnHumanNPC(); playSound(440, 'sine', 0.2, 0.2); save();
    }
}
function buyBoost() {
    if(stats.money >= stats.bPrice) {
        stats.money -= stats.bPrice; stats.mult += 0.5; stats.bPrice = Math.floor(stats.bPrice * 2);
        playSound(660, 'square', 0.2, 0.1); save();
    }
}
function doRebirth() {
    if(stats.money >= 5000) {
        stats.rebirths++; stats.money = 25; stats.workers = 0; stats.wPrice = 25; stats.bPrice = 100;
        stats.mult = 1 + (stats.rebirths * 1.0); 
        workerNPCs.forEach(n => scene.remove(n.mesh)); workerNPCs = [];
        playSound(880, 'sawtooth', 0.8, 0.2); save(); closeShop();
    }
}

function startGame() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    load(); gameStarted = true;
    document.getElementById("menu-overlay").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("msg").style.display = "block";
    document.getElementById("minimap-container").style.display = "block";
    document.body.requestPointerLock();
}
function closeShop() { document.getElementById("shop-gui").style.display = "none"; document.body.requestPointerLock(); }

// --- CONTROLS ---
let player = { x:0, z:10, yaw:0 };
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
document.addEventListener("mousemove", e => {
    if(document.pointerLockElement === document.body) player.yaw -= e.movementX * 0.002;
    camera.rotation.set(0, player.yaw, 0);
});
document.addEventListener("mousedown", () => {
    if(!gameStarted) return;
    if(Math.sqrt(player.x**2 + (player.z + 25)**2) < 12) {
        document.exitPointerLock(); document.getElementById("shop-gui").style.display = "block";
    }
});

// --- MINI-MAP RENDERER ---
const mapCanvas = document.getElementById("minimap-canvas");
const mapCtx = mapCanvas.getContext("2d");
mapCanvas.width = 150; mapCanvas.height = 150;

function drawMinimap() {
    mapCtx.fillStyle = "black"; mapCtx.fillRect(0, 0, 150, 150);
    const scale = 0.5; // Map zoom
    const centerX = 75; const centerZ = 75;

    // Draw Shop
    mapCtx.fillStyle = "#3399ff";
    mapCtx.fillRect(centerX - 3, centerZ - 25*scale - 3, 6, 6);

    // Draw Workers
    mapCtx.fillStyle = "yellow";
    workerNPCs.forEach(npc => {
        let x = centerX + npc.mesh.position.x * scale;
        let z = centerZ + npc.mesh.position.z * scale;
        mapCtx.beginPath(); mapCtx.arc(x, z, 2, 0, Math.PI*2); mapCtx.fill();
    });

    // Draw Player
    mapCtx.save();
    mapCtx.translate(centerX + player.x * scale, centerZ + player.z * scale);
    mapCtx.rotate(player.yaw + Math.PI);
    mapCtx.fillStyle = "#00ffff";
    mapCtx.beginPath(); mapCtx.moveTo(0, -5); mapCtx.lineTo(4, 5); mapCtx.lineTo(-4, 5); mapCtx.closePath(); mapCtx.fill();
    mapCtx.restore();
}

function update() {
    if(!gameStarted) return;
    
    let currentSpeed = keys["shift"] ? 0.65 : 0.28;

    if(keys["w"]) { player.x -= Math.sin(player.yaw) * currentSpeed; player.z -= Math.cos(player.yaw) * currentSpeed; }
    if(keys["s"]) { player.x += Math.sin(player.yaw) * currentSpeed; player.z += Math.cos(player.yaw) * currentSpeed; }
    if(keys["a"]) { player.x -= Math.cos(player.yaw) * currentSpeed; player.z += Math.sin(player.yaw) * currentSpeed; }
    if(keys["d"]) { player.x += Math.cos(player.yaw) * currentSpeed; player.z -= Math.sin(player.yaw) * currentSpeed; }
    camera.position.set(player.x, 3.5, player.z);

    trees.forEach(tree => {
        if(Math.sqrt((player.x - tree.x)**2 + (player.z - tree.z)**2) < 3.5) {
            stats.money += 15 * stats.mult;
            tree.obj.position.x = (Math.random()-0.5)*300; tree.obj.position.z = (Math.random()-0.5)*300;
            tree.x = tree.obj.position.x; tree.z = tree.obj.position.z;
            playSound(1200, 'sine', 0.05, 0.1); save();
        }
    });

    workerNPCs.forEach(npc => {
        let dx = npc.tx - npc.mesh.position.x; let dz = npc.tz - npc.mesh.position.z;
        let dist = Math.sqrt(dx*dx + dz*dz);
        if(dist > 1) {
            npc.mesh.position.x += (dx/dist) * 0.14; npc.mesh.position.z += (dz/dist) * 0.14;
            npc.mesh.lookAt(npc.tx, 0, npc.tz);
        } else { npc.tx = (Math.random()-0.5)*200; npc.tz = (Math.random()-0.5)*200; }
        stats.money += (0.05 * stats.mult);
    });

    drawMinimap();
    document.getElementById("money").innerText = Math.floor(stats.money);
    document.getElementById("workerCount").innerText = stats.workers;
    document.getElementById("rebirthCount").innerText = stats.rebirths;
    document.getElementById("uiMult").innerText = stats.mult.toFixed(1);
    document.getElementById("wP").innerText = stats.wPrice;
    document.getElementById("bP").innerText = stats.bP || stats.bPrice;
    document.getElementById("buyWorker").disabled = stats.money < stats.wPrice;
    document.getElementById("buyBoost").disabled = stats.money < stats.bPrice;
    document.getElementById("rebirth-btn").disabled = stats.money < 5000;
}

function animate() { update(); renderer.render(scene, camera); requestAnimationFrame(animate); }
animate();
window.onbeforeunload = save;
</script>
</body>
</html>
