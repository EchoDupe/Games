<!DOCTYPE html>
<html>
<head>
    <title>EchoDupe | OS Hub</title>
    <style>
        :root { --neon: #00ffff; --bg: #000a0a; --dark-gray: #555555; }
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }

        /* Scanline Overlay */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 200; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .container { 
            border: 1px solid var(--neon); padding: 40px; 
            background: rgba(0, 10, 10, 0.9); 
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.2), 0 0 30px rgba(0, 255, 255, 0.1); 
            text-align: center; max-width: 700px; z-index: 10;
        }

        #title-img {
            width: 100%; max-width: 550px; height: auto;
            margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--neon));
            animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; } 5% { opacity: 0.8; } 10% { opacity: 1; }
            70% { opacity: 0.9; } 72% { opacity: 0.2; } 73% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        .status { font-size: 0.9em; color: #008888; margin-bottom: 30px; letter-spacing: 2px; }
        
        .menu { display: grid; gap: 15px; width: 100%; }
        
        .game-link {
            text-decoration: none; color: var(--neon); border: 1px solid var(--neon);
            padding: 15px; transition: 0.2s; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer;
        }

        .game-link:hover { 
            background: var(--neon); color: #000; 
            box-shadow: 0 0 25px var(--neon); 
        }

        /* Footer Style */
        .footer { margin-top: 40px; font-size: 0.8em; letter-spacing: 1px; }
        .footer span { color: var(--dark-gray); }
        .footer b { color: var(--neon); text-shadow: 0 0 5px var(--neon); }

        /* Loading Overlay */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; flex-direction: column;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="loader">
    <div id="load-text" style="font-size: 1.5em; margin-bottom: 20px;">DECRYPTING_SIMULATION...</div>
    <div style="width: 300px; height: 10px; border: 1px solid var(--neon);">
        <div id="bar" style="width: 0%; height: 100%; background: var(--neon);"></div>
    </div>
</div>

<div class="container">
    <img src="assets/title.png" id="title-img" alt="ECHODUPE NETWORK">
    
    <div class="status" id="status-text">SYSTEM_LINK: ESTABLISHED... ACCESS_GRANTED</div>

    <div class="menu">
        <div onclick="boot('v6-5/index.html')" class="game-link">Boot Simulation V6.5</div>
        <div onclick="boot('v6-4/index.html')" class="game-link">Boot Simulation V6.4</div>
    </div>

    <div class="footer">
        <span>DEVELOPED AND DESIGNED BY </span><b>SKITXOE</b>
    </div>
</div>

<script>
    const status = document.getElementById('status-text');
    const text = status.innerText;
    status.innerText = '';
    let i = 0;
    function type() {
        if (i < text.length) {
            status.innerText += text.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();

    function boot(url) {
        document.getElementById('loader').style.display = 'flex';
        let width = 0;
        const bar = document.getElementById('bar');
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                window.location.href = url;
            } else {
                width += Math.random() * 15;
                if (width > 100) width = 100;
                bar.style.width = width + '%';
            }
        }, 150);
    }
</script>

</body>
</html>
