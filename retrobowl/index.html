<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="robots" content="noindex,nofollow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta charset="utf-8" />

    <title>EchoDupe | Retro Bowl</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">

    <style>
      body {
        background: #000;
        color: #cccccc;
        margin: 0px;
        padding: 0px;
        border: 0px;
        overflow: hidden;
      }
      canvas {
        image-rendering: optimizeSpeed;
        -webkit-interpolation-mode: nearest-neighbor;
        -ms-touch-action: none;
        margin: 0px;
        padding: 0px;
        border: 0px;
      }
      :-webkit-full-screen #canvas {
        width: 100%;
        height: 100%;
      }
      div.gm4html5_div_class {
        margin: 0px;
        padding: 0px;
        border: 0px;
      }

      /* BACK TO HUB BUTTON WITH HOUSE ICON */
      .back-to-hub {
          position: fixed;
          top: 15px; /* Kept at top to avoid blocking Retro Bowl menus */
          right: 15px;
          z-index: 9999;
          background: rgba(15, 15, 20, 0.8);
          border: 1px solid rgba(6, 182, 212, 0.5);
          color: #06b6d4;
          padding: 10px 18px;
          border-radius: 12px;
          font-family: 'Helvetica', Arial, sans-serif;
          font-weight: bold;
          text-decoration: none;
          display: flex;
          align-items: center;
          gap: 8px;
          backdrop-filter: blur(10px);
          transition: all 0.3s ease;
          box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
          text-transform: uppercase;
          font-size: 11px;
          letter-spacing: 1px;
          cursor: pointer;
      }
      .back-to-hub:hover {
          background: #06b6d4;
          color: #000;
          box-shadow: 0 0 25px rgba(6, 182, 212, 0.6);
          transform: translateY(-2px);
      }

      div.gm4html5_login {
        padding: 20px;
        position: absolute;
        border: solid 2px #000000;
        background-color: #404040;
        color: #00ff00;
        border-radius: 15px;
        box-shadow: #101010 20px 20px 40px;
      }
      :-webkit-full-screen {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <a href="https://echodupe.github.io/Games/" class="back-to-hub">
        <i class="fa-solid fa-house"></i>
        <span>Back to Hub</span>
    </a>

    <div class="gm4html5_div_class" id="gm4html5_div_id">
      <img src="html5game/splash.png" id="GM4HTML5_loadingscreen" alt="GameMaker:HTML5 loading screen" style="display: none;" />
      <canvas id="canvas" width="960" height="540">
        <p>Your browser doesn't support HTML5 canvas.</p>
      </canvas>
    </div>

    <script type="text/javascript" src="html5game/RetroBowl.js?WAEAC=1633155445"></script>
    <script>
      window.onload = GameMaker_Init;

      // Maintain title integrity
      var targetTitle = "EchoDupe | Retro Bowl";
      setInterval(function() {
          if (document.title !== targetTitle) document.title = targetTitle;
      }, 1000);
    </script>
    <script src="/js/main.js"></script>
  </body>
</html>
