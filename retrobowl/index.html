<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="robots" content="noindex,nofollow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta charset="utf-8" />

    <title>EchoDupe | Retro Bowl</title>

    <style>
      body {
        background: #000;
        color: #cccccc;
        margin: 0px;
        padding: 0px;
        border: 0px;
        overflow: hidden; /* Prevent scrolling while playing */
      }
      canvas {
        image-rendering: optimizeSpeed;
        -webkit-interpolation-mode: nearest-neighbor;
        -ms-touch-action: none;
        margin: 0px;
        padding: 0px;
        border: 0px;
      }
      :-webkit-full-screen #canvas {
        width: 100%;
        height: 100%;
      }
      div.gm4html5_div_class {
        margin: 0px;
        padding: 0px;
        border: 0px;
      }

      /* HUB BUTTON STYLES */
      #return-terminal {
          position: fixed;
          top: 15px;
          right: 15px;
          z-index: 2147483647 !important;
          background: rgba(0, 0, 0, 0.8);
          border: 1px solid #06b6d4;
          color: #06b6d4;
          padding: 8px 15px;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          font-size: 11px;
          font-weight: 900;
          text-transform: uppercase;
          letter-spacing: 1px;
          cursor: pointer !important;
          box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
          transition: all 0.2s;
          border-radius: 4px;
      }
      #return-terminal:hover {
          background: #06b6d4;
          color: #000;
      }

      /* START - Login Dialog Box */
      div.gm4html5_login {
        padding: 20px;
        position: absolute;
        border: solid 2px #000000;
        background-color: #404040;
        color: #00ff00;
        border-radius: 15px;
        box-shadow: #101010 20px 20px 40px;
      }
      div.gm4html5_cancel_button {
        float: right;
      }
      div.gm4html5_login_button {
        float: left;
      }
      div.gm4html5_login_header {
        text-align: center;
      }
      /* END - Login Dialog Box */
      :-webkit-full-screen {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <button id="return-terminal">EXIT_TO_HUB</button>

    <div class="gm4html5_div_class" id="gm4html5_div_id">
      <img src="html5game/splash.png" id="GM4HTML5_loadingscreen" alt="GameMaker:HTML5 loading screen" style="display: none;" />
      <canvas id="canvas" width="960" height="540">
        <p>Your browser doesn't support HTML5 canvas.</p>
      </canvas>
    </div>

    <script type="text/javascript" src="html5game/RetroBowl.js?WAEAC=1633155445"></script>
    <script>
      window.onload = GameMaker_Init;

      // TERMINAL REDIRECT & TITLE LOCK
      document.getElementById('return-terminal').addEventListener('click', function() {
          window.location.replace("https://echodupe.github.io/Games/");
      });

      // Maintain title integrity
      var targetTitle = "EchoDupe | Retro Bowl";
      setInterval(function() {
          if (document.title !== targetTitle) document.title = targetTitle;
      }, 1000);
    </script>
    <script src="/js/main.js"></script>
  </body>
</html>
